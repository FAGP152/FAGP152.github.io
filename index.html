<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
  body { background: #0a0a0f; color: #e8e8f0; font-family: sans-serif; padding: 20px; }
  .box { background: #12121a; border: 1px solid #2a2a3a; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  h1 { color: #7c6af7; margin-bottom: 8px; }
  .green { color: #4ade80; }
  .red { color: #f87171; }
  button { background: #7c6af7; border: none; border-radius: 10px; color: #fff; padding: 12px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
</style>
</head>
<body>

<div class="box">
  <h1>✅ Paso 1: HTML carga</h1>
  <p class="green">Si ves esto, GitHub Pages funciona correctamente.</p>
</div>

<div class="box">
  <h1>🔧 Paso 2: JavaScript</h1>
  <p id="jsResult" class="red">❌ JavaScript NO está funcionando</p>
</div>

<div class="box">
  <h1>💾 Paso 3: localStorage</h1>
  <p id="lsResult" class="red">❌ localStorage NO está funcionando</p>
</div>

<div class="box">
  <h1>🔢 Paso 4: Formato números</h1>
  <p id="fmtResult" class="red">❌ Formato NO está funcionando</p>
</div>

<div class="box">
  <h1>📊 Resultado</h1>
  <p id="finalResult">Calculando...</p>
  <button onclick="reintentar()">🔄 Reintentar</button>
</div>

<script>
// Paso 2: JS básico
try {
  document.getElementById('jsResult').textContent = '✅ JavaScript funciona';
  document.getElementById('jsResult').className = 'green';
} catch(e) {}

// Paso 3: localStorage
try {
  localStorage.setItem('test', '123');
  const val = localStorage.getItem('test');
  if (val === '123') {
    document.getElementById('lsResult').textContent = '✅ localStorage funciona';
    document.getElementById('lsResult').className = 'green';
  } else {
    document.getElementById('lsResult').textContent = '❌ localStorage retorna valor incorrecto';
  }
} catch(e) {
  document.getElementById('lsResult').textContent = '❌ Error: ' + e.message;
}

// Paso 4: Formato números
try {
  const n = 13477.23;
  const formatted = '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  document.getElementById('fmtResult').textContent = '✅ Formato funciona: ' + formatted;
  document.getElementById('fmtResult').className = 'green';
} catch(e) {
  document.getElementById('fmtResult').textContent = '❌ Error: ' + e.message;
}

// Resultado final
try {
  const js = document.getElementById('jsResult').className === 'green';
  const ls = document.getElementById('lsResult').className === 'green';
  const fmt = document.getElementById('fmtResult').className === 'green';
  const el = document.getElementById('finalResult');
  if (js && ls && fmt) {
    el.textContent = '🎉 Todo funciona. El problema es específico del código de la app.';
    el.className = 'green';
  } else {
    el.textContent = '⚠️ Hay problemas básicos en este navegador.';
    el.className = 'red';
  }
} catch(e) {}

function reintentar() { location.reload(); }
</script>
</body>
</html>
